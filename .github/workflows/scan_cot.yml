name: COT Scan + Update Conviction

on:
  schedule:
    # Every Saturday 14:00 UTC — after CFTC Friday ~15:30 EST release
    - cron: "0 14 * * 6"
  workflow_dispatch:  # manual trigger for testing

jobs:
  scan_cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy --quiet

      - name: Run COT scan
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scanner/scan_cot.py

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cot.json data/conviction.json
          git diff --staged --quiet || git commit -m "COT scan $(date -u +'%Y-%m-%d')"
          git push
