name: News Brief

on:
  schedule:
    - cron: "0 5,9,13,17 * * *"   # 7/11/15/19 Germany summer time (CEST=UTC+2)
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  scan_news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt anthropic
      - name: Run news scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scanner/scan_news.py
      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/news_brief.json dashboard/news_brief.json
          cp data/regime.json dashboard/regime.json || true
          git add data/news_brief.json dashboard/news_brief.json data/regime.json dashboard/regime.json
          git diff --cached --quiet || git commit -m "chore: news brief $(date -u +%Y-%m-%dT%H:%M)"
          git pull origin main --no-rebase
          git push
