name: D1 Scan + Update Regime
on:
  schedule:
    - cron: "10 0 * * 1-5"   # Weekdays at 00:10 UTC — after markets close
  workflow_dispatch:
permissions:
  contents: write
jobs:
  scan_d1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run D1 scan
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scanner/scan_d1.py
      - name: Run embed D1 OHLCV
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python scanner/embed_d1_ohlcv.py
      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/d1_scores.json  dashboard/
          cp data/csm.json        dashboard/ || true
          cp data/regime.json     dashboard/ || true
          cp data/conviction.json dashboard/ || true
          git add data/d1_scores.json \
                  data/csm.json \
                  data/regime.json \
                  data/conviction.json \
                  dashboard/ || true
          git diff --cached --quiet || git commit -m "chore: D1 scan $(date -u +%Y-%m-%dT%H:%M)"
          git pull origin main --no-rebase -X ours
          git push
