name: Rates Scan

on:
  schedule:
    - cron: "30 6 * * *"   # Daily at 06:30 UTC
  workflow_dispatch:
  push:
    paths:
      - 'data/rates_manual.json'

permissions:
  contents: write

jobs:
  scan_rates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run rates scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner/scan_rates.py
      - name: Commit rates data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rates.json data/alert_state.json || true
          git diff --cached --quiet || git commit -m "chore: rates scan $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
