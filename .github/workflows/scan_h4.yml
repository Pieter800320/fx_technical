name: H4 Scan + Deploy Dashboard

on:
  schedule:
    - cron: "5 0,4,8,12,16,20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  scan_h4:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run H4 scan
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL:      ${{ secrets.DASHBOARD_URL }}
        run: python scanner/scan_h4.py

      - name: Commit updated data + cooldown state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/h4_scores.json dashboard/
          cp data/alerts.json    dashboard/ || true
          cp data/regime.json    dashboard/ || true
          git add data/h4_scores.json state/cooldown.json data/alerts.json data/regime.json dashboard/ || true
          git diff --cached --quiet || git commit -m "chore: H4 scan update $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push

  deploy_dashboard:
    needs: scan_h4
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Copy data files into dashboard folder
        run: |
          cp data/h1_scores.json  dashboard/
          cp data/h4_scores.json  dashboard/
          cp data/d1_scores.json  dashboard/
          cp data/csm.json        dashboard/
          cp data/alerts.json     dashboard/
          cp data/regime.json     dashboard/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
