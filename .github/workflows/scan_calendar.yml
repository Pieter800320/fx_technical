name: Calendar Scan + Deploy Dashboard

on:
  schedule:
    - cron: "0 6 * * *"   # Daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages:    write
  id-token: write

jobs:
  scan_calendar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Run calendar scan
        run: python scanner/scan_calendar.py
      - name: Commit calendar data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/calendar.json dashboard/ || true
          git add data/calendar.json dashboard/calendar.json || true
          git diff --cached --quiet || git commit -m "chore: calendar scan $(date -u +%Y-%m-%dT%H:%M)"
          git pull origin main --no-rebase
          git push

  deploy_dashboard:
    needs: scan_calendar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Copy data files
        run: |
          cp data/h1_scores.json  dashboard/
          cp data/h4_scores.json  dashboard/
          cp data/d1_scores.json  dashboard/
          cp data/csm.json        dashboard/
          cp data/alerts.json     dashboard/
          cp data/regime.json     dashboard/ || true
          cp data/conviction.json dashboard/ || true
          cp data/cot.json        dashboard/ || true
          cp data/calendar.json   dashboard/ || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
