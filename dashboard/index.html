<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FX Technical Dashboard</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --strong-buy:  #1a7f3c;
    --buy:         #238636;
    --neutral:     #30363d;
    --sell:        #b62324;
    --strong-sell: #8b0000;
    --buy-text:    #3fb950;
    --sell-text:   #f85149;
    --neutral-text:#8b949e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-size: 18px; font-weight: 600; }
  #last-updated { color: var(--muted); font-size: 12px; }

  /* ── Section headings ── */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Currency Strength Bar ── */
  #csm-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .csm-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .csm-label {
    width: 36px;
    font-weight: 600;
    font-size: 13px;
  }

  .csm-bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .csm-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #1f6feb, #58a6ff);
    transition: width 0.4s ease;
  }

  .csm-value {
    width: 38px;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Signal Table ── */
  .table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 9px 12px;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  .pair-cell {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  .score-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .score-strong-buy  { background: #162d21; color: #e6edf3; }
  .score-buy         { background: #162d21; color: #e6edf3; }
  .score-neutral     { background: var(--neutral); color: var(--muted); }
  .score-sell        { background: #3d1a1a; color: #e6edf3; }
  .score-strong-sell { background: #3d1a1a; color: #e6edf3; }

  /* ── AI Blurb Panel ── */
  #blurb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }

  .blurb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .blurb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .blurb-pair {
    font-weight: 700;
    font-size: 13px;
  }

  .blurb-direction {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .blurb-direction.bull { background: #162d21; color: #e6edf3; }
  .blurb-direction.bear { background: #3d1a1a; color: #e6edf3; }

  .blurb-text {
    font-size: 12px;
    line-height: 1.6;
    color: #c9d1d9;
  }

  .blurb-time {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:hover { background: #30363d; color: var(--text); }
  .copy-btn.copied { color: #3fb950; border-color: #3fb950; }

  .empty-blurb {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  /* ── Loading / Error states ── */
  .loading { color: var(--muted); padding: 20px; text-align: center; }
  .error   { color: #f85149;  padding: 20px; text-align: center; }

  /* ── Session badge ── */
  #session-badge {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .session-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .session-chip.active {
    border-color: #388bfd;
    color: #58a6ff;
    background: rgba(56,139,253,0.1);
  }

  .score-num {
    font-size: 11px;
    margin-top: 3px;
    font-weight: 600;
  }

  td { vertical-align: top; }

  @media (max-width: 480px) {
    body { padding: 10px; }
    th, td { padding: 7px 6px; }
    .score-pill { padding: 2px 7px; font-size: 10px; }
    .score-num  { font-size: 10px; }
    .pair-cell  { font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>FX Technical Dashboard</h1>
  <span id="last-updated">Loading...</span>
</header>

<!-- Session status -->
<div id="session-badge">
  <span class="session-chip" id="sess-sydney">Sydney</span>
  <span class="session-chip" id="sess-tokyo">Tokyo</span>
  <span class="session-chip" id="sess-london">London</span>
  <span class="session-chip" id="sess-newyork">New York</span>
</div>

<!-- Currency Strength -->
<div class="section-title">Currency Strength (D1)</div>
<div id="csm-grid"><div class="loading">Loading...</div></div>

<!-- Signal Table -->
<div class="section-title">Technical Scores</div>
<div class="table-wrap">
  <table id="signal-table">
    <thead>
      <tr>
        <th>Pair</th>
        <th>H1</th>
        <th>H4</th>
        <th>D1</th>
      </tr>
    </thead>
    <tbody id="signal-tbody">
      <tr><td colspan="4" class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- AI Blurb Panel -->
<div class="section-title">AI Prompt</div>
<div id="blurb-grid"><div class="loading">No alerts fired yet.</div></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PAIRS = [
  "EUR/USD","GBP/USD","USD/JPY","USD/CHF",
  "AUD/USD","USD/CAD","NZD/USD","EUR/JPY","GBP/JPY","XAU/USD"
];

const DISPLAY = { "XAU/USD": "XAUUSD" };
function displayName(pair) { return DISPLAY[pair] || pair.replace("/",""); }

const GITHUB_API = "https://api.github.com/repos/Pieter800320/fx_technical/contents/data";

const SESSIONS = {
  Sydney:   [21, 6],   // wraps midnight
  Tokyo:    [0,  9],
  London:   [7,  16],
  "New York": [12, 21],
};

const SESSION_IDS = {
  "Sydney":   "sess-sydney",
  "Tokyo":    "sess-tokyo",
  "London":   "sess-london",
  "New York": "sess-newyork",
};

// ── Session detection ────────────────────────────────────────────────────────
function getActiveSessions() {
  const now = new Date();
  const hour = now.getUTCHours();
  return Object.entries(SESSIONS)
    .filter(([, [s, e]]) => s > e ? (hour >= s || hour < e) : (hour >= s && hour < e))
    .map(([name]) => name);
}

function renderSessions() {
  const active = getActiveSessions();
  Object.entries(SESSION_IDS).forEach(([name, id]) => {
    const el = document.getElementById(id);
    el.classList.toggle("active", active.includes(name));
  });
}

// ── Score pill ───────────────────────────────────────────────────────────────
function scorePill(label) {
  if (!label || label === "N/A") return `<span class="score-pill score-neutral">N/A</span>`;
  const cls = label.toLowerCase().replace(/ /g, "-");
  return `<span class="score-pill score-${cls}">${label}</span>`;
}

function numCell(score) {
  if (score == null) return `<span style="color:var(--muted)">—</span>`;
  const col = score > 0 ? "var(--buy-text)" : score < 0 ? "var(--sell-text)" : "var(--muted)";
  return `<span style="color:${col};font-weight:600">${score > 0 ? "+" : ""}${score}</span>`;
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadJSON(filename) {
  try {
    const r = await fetch(`${GITHUB_API}/${filename}?t=${Date.now()}`, {
      headers: { "Accept": "application/vnd.github.v3.raw" }
    });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// ── Render CSM ───────────────────────────────────────────────────────────────
function renderCSM(csm) {
  const el = document.getElementById("csm-grid");
  if (!csm || !csm.rankings) {
    el.innerHTML = `<div class="empty-blurb">Currency strength data unavailable.</div>`;
    return;
  }
  const entries = Object.entries(csm.rankings); // already sorted by backend
  el.innerHTML = entries.map(([ccy, val]) => `
    <div class="csm-row">
      <span class="csm-label">${ccy}</span>
      <div class="csm-bar-track">
        <div class="csm-bar-fill" style="width:${val}%"></div>
      </div>
      <span class="csm-value">${val.toFixed(1)}</span>
    </div>
  `).join("");
}

// ── Render signal table ───────────────────────────────────────────────────────
function tfCell(data) {
  if (!data) return `<td><span class="score-pill score-neutral">N/A</span><div class="score-num" style="color:var(--muted)">—</div></td>`;
  const num = data.score > 0 ? "+" + data.score : data.score;
  const col = data.score > 0 ? "var(--buy-text)" : data.score < 0 ? "var(--sell-text)" : "var(--muted)";
  return `<td>${scorePill(data.label)}<div class="score-num" style="color:${col}">${num}</div></td>`;
}

function renderTable(h1, h4, d1) {
  const rows = PAIRS.map(pair => {
    return `
      <tr>
        <td class="pair-cell">${displayName(pair)}</td>
        ${tfCell(h1 && h1[pair])}
        ${tfCell(h4 && h4[pair])}
        ${tfCell(d1 && d1[pair])}
      </tr>
    `;
  });
  document.getElementById("signal-tbody").innerHTML = rows.join("");
}

// ── Render AI blurbs ──────────────────────────────────────────────────────────
const _prompts = {};

function renderBlurbs(blurbs) {
  const el = document.getElementById("blurb-grid");
  if (!blurbs || !blurbs.alerts || blurbs.alerts.length === 0) {
    el.innerHTML = `<div class="loading">No alerts have fired yet.</div>`;
    return;
  }
  const seen = new Set();
  const latest = blurbs.alerts
    .slice().reverse()
    .filter(a => { const k = a.pair; if (seen.has(k)) return false; seen.add(k); return true; });

  const cards = latest.map((a, i) => {
    const dirClass = a.direction === "bull" ? "bull" : "bear";
    const dirLabel = a.direction === "bull" ? "BUY" : "SELL";
    const time = a.timestamp ? new Date(a.timestamp).toLocaleString() : "";
    const headline = Array.isArray(a.blurb) ? a.blurb[1] : (a.blurb || "");
    // Store prompt in JS object — avoids any HTML attribute escaping issues
    _prompts[i] = "Please analyse this forex trade recommendation using the most current fundamental and technical data available in 50 words or less.\n\n"
      + "Pair: " + a.pair.replace("/","") + " | Direction: " + dirLabel
      + " | H1: " + (a.h1_label || "N/A")
      + " | H4: " + (a.h4_label || "N/A")
      + " | D1: " + (a.d1_label || "N/A") + "\n"
      + "News: \"" + headline + "\"\n"
      + "Time: " + time + "\n"
      + "Entry: \nTP: \nSL: \n\n"
      + "What is your view on this setup?";
    return `
      <div class="blurb-card">
        <div class="blurb-header">
          <span class="blurb-pair">${a.pair.replace("/","")}</span>
          <span class="blurb-direction ${dirClass}">${dirLabel}</span>
        </div>
        <div class="blurb-text">${headline || "<em>No news context available.</em>"}</div>
        <div class="blurb-time">${time}</div>
        <button class="copy-btn" id="copybtn-${i}" onclick="copyPrompt(${i})">⎘ Copy AI Prompt</button>
      </div>
    `;
  });
  el.innerHTML = cards.join("");
}

// ── Copy prompt ──────────────────────────────────────────────────────────────
function copyPrompt(idx) {
  const text = _prompts[idx];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copybtn-" + idx);
    btn.textContent = "✓ Copied!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "⎘ Copy AI Prompt";
      btn.classList.remove("copied");
    }, 2000);
  });
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  renderSessions();

  const [h1, h4, d1, csm, blurbs] = await Promise.all([
    loadJSON("h1_scores.json"),
    loadJSON("h4_scores.json"),
    loadJSON("d1_scores.json"),
    loadJSON("csm.json"),
    loadJSON("alerts.json"),
  ]);

  // Last updated — use the most recent timestamp from any dataset
  const timestamps = [h1, h4, d1]
    .flatMap(ds => ds ? Object.values(ds).map(v => v.updated) : [])
    .filter(Boolean)
    .sort();
  if (timestamps.length) {
    const latest = new Date(timestamps[timestamps.length - 1]);
    document.getElementById("last-updated").textContent =
      "Updated: " + latest.toLocaleString();
  }

  renderCSM(csm);
  renderTable(h1, h4, d1);
  renderBlurbs(blurbs);
}

init();
// Auto-refresh every 5 minutes
setInterval(init, 5 * 60 * 1000);
</script>
</body>
</html>
