<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forex1212</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --strong-buy:  #1a7f3c;
    --buy:         #238636;
    --neutral:     #30363d;
    --sell:        #b62324;
    --strong-sell: #8b0000;
    --buy-text:    #3fb950;
    --sell-text:   #f85149;
    --neutral-text:#8b949e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 16px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  header h1 { font-size: 18px; font-weight: 600; }
  #last-updated { color: var(--muted); font-size: 12px; }

  /* ── Section headings ── */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: 20px 0 10px;
  }

  /* ── Currency Strength Bar ── */
  #csm-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    position: relative;
    overflow: visible;
  }

  .csm-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .csm-label {
    width: 36px;
    font-weight: 600;
    font-size: 13px;
  }

  .csm-bar-track {
    flex: 1;
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .csm-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #1f6feb, #58a6ff);
    transition: width 0.4s ease;
  }

  .csm-value {
    width: 38px;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Signal Table ── */
  .table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    padding: 8px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 9px 12px;
    border-bottom: 1px solid #21262d;
    white-space: nowrap;
  }

  tr:last-child td { border-bottom: none; }

  .pair-cell {
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  .score-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .score-strong-buy  { background: #162d21; color: #e6edf3; }
  .score-buy         { background: #162d21; color: #e6edf3; }
  .score-neutral     { background: var(--neutral); color: var(--muted); }
  .score-sell        { background: #3d1a1a; color: #e6edf3; }
  .score-strong-sell { background: #3d1a1a; color: #e6edf3; }

  /* ── AI Blurb Panel ── */
  #blurb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
  }

  .blurb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .blurb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .blurb-pair {
    font-weight: 700;
    font-size: 13px;
  }

  .blurb-direction {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .blurb-direction.bull { background: #162d21; color: #e6edf3; }
  .blurb-direction.bear { background: #3d1a1a; color: #e6edf3; }

  .blurb-text {
    font-size: 12px;
    line-height: 1.6;
    color: #c9d1d9;
  }

  .blurb-time {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  .copy-btn {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .copy-btn:hover { background: #30363d; color: var(--text); }
  .copy-btn.copied { color: #3fb950; border-color: #3fb950; }

  .empty-blurb {
    color: var(--muted);
    font-style: italic;
    font-size: 12px;
  }

  /* ── Loading / Error states ── */
  .loading { color: var(--muted); padding: 20px; text-align: center; }
  .error   { color: #f85149;  padding: 20px; text-align: center; }

  /* ── Session badge ── */
  #session-badge {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .session-chip {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .session-chip.active {
    border-color: #388bfd;
    color: #58a6ff;
    background: rgba(56,139,253,0.1);
  }

  #market-closed {
    display: none;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid #b62324;
    color: #f85149;
    background: rgba(182,35,36,0.1);
    font-weight: 600;
  }

  /* ── Market Brief button ── */
  #market-brief-btn {
    display: inline-flex;
    flex-direction: column;
    margin: 14px 0;
    padding: 8px 14px;
    background: #21262d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: left;
  }
  #market-brief-btn:hover { background: #30363d; }
  #market-brief-btn.copied { border-color: #3fb950; }
  #market-brief-btn .brief-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  #market-brief-btn.copied .brief-title { color: #3fb950; }
  #market-brief-btn .brief-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Signal dropdown ── */
  .pill-wrap {
    position: relative;
    display: inline-block;
    overflow: visible;
  }

  .score-pill {
    cursor: pointer;
    user-select: none;
  }

  .signal-drop {
    display: none;
    position: fixed;
    z-index: 1000;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    min-width: 200px;
    font-size: 11px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }

  .drop-heading {
    font-size: 11px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .signal-drop.open { display: block; }

  .sig-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 3px 0;
    border-bottom: 1px solid #21262d;
    gap: 16px;
  }

  .sig-row:last-child { border-bottom: none; }

  .sig-name { color: var(--muted); }

  .sig-val-bull { color: #3fb950; font-weight: 600; }
  .sig-val-bear { color: #f85149; font-weight: 600; }
  .sig-val-neu  { color: var(--muted); font-weight: 600; }

  .sig-divider {
    border-top: 1px solid #30363d;
    margin: 6px 0;
  }

  /* ── CSM dropdown ── */
  .csm-row { cursor: pointer; border-radius: 4px; padding: 2px 4px; margin: 0 -4px; }
  .csm-row:hover { background: #21262d; }

  .csm-drop {
    display: none;
    position: fixed;
    z-index: 1000;
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    min-width: 200px;
    font-size: 11px;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  .csm-drop.open { display: block; }

  .score-num {
    font-size: 11px;
    margin-top: 3px;
    font-weight: 600;
  }

  td { vertical-align: top; }

  @media (max-width: 480px) {
    body { padding: 10px; }
    th, td { padding: 7px 6px; }
    .score-pill { padding: 2px 7px; font-size: 10px; }
    .score-num  { font-size: 10px; }
    .pair-cell  { font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>Forex1212</h1>
  <span id="last-updated">Loading...</span>
</header>

<!-- Session status -->
<div id="session-badge">
  <span class="session-chip" id="sess-sydney">Sydney</span>
  <span class="session-chip" id="sess-tokyo">Tokyo</span>
  <span class="session-chip" id="sess-london">London</span>
  <span class="session-chip" id="sess-newyork">New York</span>
  <span id="market-closed">Market Closed</span>
</div>

<!-- Regime badge -->
<div id="regime-badge" style="margin-bottom:12px;display:none;">
  <span id="regime-chip" style="
    font-size:11px;padding:3px 12px;border-radius:12px;
    border:1px solid var(--border);color:var(--muted);
    font-weight:600;letter-spacing:0.04em;">
    Regime: —
  </span>
</div>

<!-- Currency Strength -->
<div class="section-title">Currency Strength</div>
<div id="csm-grid"><div class="loading">Loading...</div></div>

<!-- Market Brief -->
<button id="market-brief-btn" onclick="copyMarketBrief()">
  <span class="brief-title">Market Brief</span>
  <span class="brief-sub">Copy AI Prompt</span>
</button>

<!-- Signal Table -->
<div class="section-title">Technical Scores</div>
<div class="table-wrap">
  <table id="signal-table">
    <thead>
      <tr>
        <th>Pair</th>
        <th>H1</th>
        <th>H4</th>
        <th>D1</th>
      </tr>
    </thead>
    <tbody id="signal-tbody">
      <tr><td colspan="4" class="loading">Loading...</td></tr>
    </tbody>
  </table>
</div>

<!-- AI Blurb Panel -->
<div class="section-title">Signals & Headlines</div>
<div id="blurb-grid"><div class="loading">No alerts fired yet.</div></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PAIRS = [
  "EUR/USD","GBP/USD","USD/JPY","USD/CHF",
  "AUD/USD","USD/CAD","NZD/USD","EUR/JPY","GBP/JPY","XAU/USD"
];

const DISPLAY = { "XAU/USD": "XAUUSD" };
function displayName(pair) { return DISPLAY[pair] || pair.replace("/",""); }

const GITHUB_API = "https://api.github.com/repos/Pieter800320/fx_technical/contents/data";

const SESSIONS = {
  Sydney:   [21, 6],   // wraps midnight
  Tokyo:    [0,  9],
  London:   [7,  16],
  "New York": [12, 21],
};

const SESSION_IDS = {
  "Sydney":   "sess-sydney",
  "Tokyo":    "sess-tokyo",
  "London":   "sess-london",
  "New York": "sess-newyork",
};

// ── Session detection ────────────────────────────────────────────────────────
function getActiveSessions() {
  const now = new Date();
  const hour = now.getUTCHours();
  return Object.entries(SESSIONS)
    .filter(([, [s, e]]) => s > e ? (hour >= s || hour < e) : (hour >= s && hour < e))
    .map(([name]) => name);
}

function isMarketClosed() {
  const now = new Date();
  const day  = now.getUTCDay();    // 0=Sun, 6=Sat
  const hour = now.getUTCHours();
  // Closed: Saturday all day, Sunday before 22:00, Friday after 22:00
  if (day === 6) return true;
  if (day === 0 && hour < 22) return true;
  if (day === 5 && hour >= 22) return true;
  return false;
}

function renderSessions() {
  const closed = isMarketClosed();
  const badge  = document.getElementById("session-badge");
  const closedEl = document.getElementById("market-closed");

  if (closed) {
    badge.style.opacity = "0.4";
    closedEl.style.display = "inline-block";
  } else {
    badge.style.opacity = "1";
    closedEl.style.display = "none";
  }

  const active = getActiveSessions();
  Object.entries(SESSION_IDS).forEach(([name, id]) => {
    const el = document.getElementById(id);
    el.classList.toggle("active", active.includes(name) && !closed);
  });
}

// ── Score pill ───────────────────────────────────────────────────────────────
function scorePill(label) {
  if (!label || label === "N/A") return `<span class="score-pill score-neutral">N/A</span>`;
  const cls = label.toLowerCase().replace(/ /g, "-");
  return `<span class="score-pill score-${cls}">${label}</span>`;
}

function numCell(score) {
  if (score == null) return `<span style="color:var(--muted)">—</span>`;
  const col = score > 0 ? "var(--buy-text)" : score < 0 ? "var(--sell-text)" : "var(--muted)";
  return `<span style="color:${col};font-weight:600">${score > 0 ? "+" : ""}${score}</span>`;
}

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadJSON(filename, useAPI=false) {
  try {
    let r;
    if (useAPI) {
      // GitHub Contents API for files not in Pages deployment
      r = await fetch(`${GITHUB_API}/${filename}?t=${Date.now()}`, {
        headers: { "Accept": "application/vnd.github.v3.raw" }
      });
    } else {
      // Same-origin fetch for files deployed with Pages (fast, no rate limit)
      r = await fetch(filename + "?t=" + Date.now());
    }
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

// ── Render CSM ───────────────────────────────────────────────────────────────
let _openCsmDrop = null;

function toggleCsmDrop(ccy, rowEl) {
  const drop = document.getElementById("csm-drop-" + ccy);
  if (!drop) return;
  const open = drop.classList.contains("open");
  if (_openCsmDrop && _openCsmDrop !== drop) _openCsmDrop.classList.remove("open");
  if (open) { drop.classList.remove("open"); _openCsmDrop = null; return; }
  openDrop(drop, rowEl, "left");
  _openCsmDrop = drop;
}

function renderCSM(csm) {
  const el = document.getElementById("csm-grid");
  if (!csm || !csm.rankings) {
    el.innerHTML = `<div class="empty-blurb">Currency strength data unavailable.</div>`;
    return;
  }
  const conf      = csm.confidence  || {};
  const breakdown = csm.breakdown   || {};
  const entries   = Object.entries(csm.rankings);

  el.innerHTML = entries.map(([ccy, val]) => {


    // Build dropdown rows for this currency
    const pairs = breakdown[ccy] || [];
    const pairRows = pairs.map(p => {
      const col   = p.bull ? "#3fb950" : "#f85149";
      const arrow = p.bull ? "▲" : "▼";
      return `<div class="sig-row">
        <span class="sig-name">${p.pair}</span>
        <span style="color:${col};font-weight:600">${arrow} ${p.score > 0 ? "+" : ""}${p.score.toFixed(2)}</span>
      </div>`;
    }).join("");

    const dropContent = `
      <div class="drop-heading">${ccy} — Pair Breakdown</div>
      ${pairRows || "<div style='color:var(--muted)'>No data</div>"}`;

    return `
    <div class="csm-row" onclick="toggleCsmDrop('${ccy}', this)">
      <span class="csm-label">${ccy}</span>
      <div class="csm-bar-track">
        <div class="csm-bar-fill" style="width:${val}%"></div>
      </div>
      <span class="csm-value">${val.toFixed(1)}</span>
    </div>
    <div class="csm-drop" id="csm-drop-${ccy}">${dropContent}</div>`;
  }).join("");
}

// ── Render signal table ───────────────────────────────────────────────────────
const SIGNAL_LABELS = {
  EMA200: "EMA 200", EMA50: "EMA 50", RSI: "RSI > 50",
  MACD: "MACD", DMI: "DMI+/DMI-", Structure: "Structure"
};

function sigVal(v) {
  if (v === 1)  return `<span class="sig-val-bull">▲ Bull</span>`;
  if (v === -1) return `<span class="sig-val-bear">▼ Bear</span>`;
  return `<span class="sig-val-neu">→ Neutral</span>`;
}

let _openDrop = null;

function tfCell(data, uid, pos) {
  if (!data) return `<td><span class="score-pill score-neutral">N/A</span><div class="score-num" style="color:var(--muted)">—</div></td>`;
  const num = data.score > 0 ? "+" + data.score : data.score;
  const col = data.score > 0 ? "var(--buy-text)" : data.score < 0 ? "var(--sell-text)" : "var(--muted)";

  // Build signal rows
  const sigs = data.signals || {};
  const raw  = data.raw || {};
  const tfName = uid.split("-").pop().toUpperCase();
  const pairName = uid.replace(/-h[14]$|-d1$/, "").toUpperCase();
  let rows = `<div class="drop-heading">${pairName} ${tfName}</div>`;
  rows += Object.entries(SIGNAL_LABELS).map(([k, label]) => {
    const v = sigs[k] !== undefined ? sigs[k] : null;
    return `<div class="sig-row"><span class="sig-name">${label}</span>${sigVal(v)}</div>`;
  }).join("");

  // ADX + ATR
  const adx = raw.adx !== undefined ? raw.adx.toFixed(1) : "N/A";
  const filterOk = data.filter_ok !== false;
  const adxCol  = filterOk ? "var(--buy-text)" : "var(--sell-text)";
  rows += `<div class="sig-divider"></div>`;
  rows += `<div class="sig-row"><span class="sig-name">ADX</span><span style="color:${adxCol};font-weight:600">${adx}</span></div>`;
  rows += `<div class="sig-row"><span class="sig-name">ATR</span><span style="color:${filterOk ? "var(--buy-text)" : "var(--sell-text)"};font-weight:600">${filterOk ? "Normal" : "Contracted"}</span></div>`;

  return `<td>
    <div class="pill-wrap">
      <span class="score-pill ${pillClass(data.label)}" onclick="toggleDrop('${uid}')">${data.label || "N/A"}</span>
      <div class="signal-drop" id="drop-${uid}" data-pos="${pos}">${rows}</div>
    </div>
    <div class="score-num" style="color:${col}">${num}</div>
  </td>`;
}

function pillClass(label) {
  if (!label || label === "N/A") return "score-neutral";
  return "score-" + label.toLowerCase().replace(/ /g, "-");
}

function openDrop(drop, anchor, hAlign) {
  drop.style.cssText = "display:block;visibility:hidden;position:fixed;top:-9999px;left:-9999px;";
  const dW = drop.offsetWidth;
  const dH = drop.offsetHeight;
  const a  = anchor.getBoundingClientRect();
  let left;
  if (hAlign === "left")   left = a.left;
  if (hAlign === "center") left = a.left + a.width / 2 - dW / 2;
  if (hAlign === "right")  left = a.right - dW;
  left = Math.max(8, Math.min(left, window.innerWidth - dW - 8));
  const top = (a.bottom + 4 + dH > window.innerHeight - 8) ? a.top - dH - 4 : a.bottom + 4;
  drop.style.cssText = "";
  drop.style.position = "fixed";
  drop.style.left = left + "px";
  drop.style.top  = top  + "px";
  drop.classList.add("open");
}

function toggleDrop(uid) {
  const el = document.getElementById("drop-" + uid);
  if (!el) return;
  const open = el.classList.contains("open");
  if (_openDrop && _openDrop !== el) _openDrop.classList.remove("open");
  if (open) { el.classList.remove("open"); _openDrop = null; return; }
  const pill   = el.previousElementSibling;
  const pos    = el.dataset.pos || "left";
  const hAlign = pos === "right" ? "left" : pos === "left" ? "right" : "center";
  openDrop(el, pill, hAlign);
  _openDrop = el;
}

// Close dropdown when clicking outside
document.addEventListener("click", e => {
  if (!e.target.classList.contains("score-pill") && _openDrop) {
    _openDrop.classList.remove("open");
    _openDrop = null;
  }
});

function renderTable(h1, h4, d1) {
  const rows = PAIRS.map(pair => {
    const slug = pair.replace("/","");
    return `
      <tr>
        <td class="pair-cell">${displayName(pair)}</td>
        ${tfCell(h1 && h1[pair], slug + "-h1", "right")}
        ${tfCell(h4 && h4[pair], slug + "-h4", "center")}
        ${tfCell(d1 && d1[pair], slug + "-d1", "left")}
      </tr>
    `;
  });
  document.getElementById("signal-tbody").innerHTML = rows.join("");
}

// ── Render AI blurbs ──────────────────────────────────────────────────────────
const _prompts = {};

function renderBlurbs(blurbs) {
  const el = document.getElementById("blurb-grid");
  if (!blurbs || !blurbs.alerts || blurbs.alerts.length === 0) {
    el.innerHTML = `<div class="loading">No alerts have fired yet.</div>`;
    return;
  }
  const seen = new Set();
  const latest = blurbs.alerts
    .slice().reverse()
    .filter(a => { const k = a.pair; if (seen.has(k)) return false; seen.add(k); return true; });

  const cards = latest.map((a, i) => {
    const dirClass = a.direction === "bull" ? "bull" : "bear";
    const dirLabel = a.direction === "bull" ? "BUY" : "SELL";
    const time = a.timestamp ? new Date(a.timestamp).toLocaleString() : "";
    const headline = Array.isArray(a.blurb) ? a.blurb[1] : (a.blurb || "");
    // Store prompt in JS object — avoids any HTML attribute escaping issues
    const regime_label = (_cachedData.regime && _cachedData.regime.regime) ? _cachedData.regime.regime : "Unknown";
    const regime_conf  = (_cachedData.regime && _cachedData.regime.confidence) ? _cachedData.regime.confidence : "";

    // Extension flag from h4 data
    const pairData = _cachedData.h4 && _cachedData.h4[a.pair];
    const extData  = pairData && pairData.extended;
    const extended = extData && extData.extended ? "Yes — " + (extData.reasons || []).join("; ") : "No";
    const adxVal   = pairData && pairData.raw ? (pairData.raw.adx || "N/A") : "N/A";
    const atrOk    = pairData ? (pairData.filter_ok !== false ? "Normal" : "Contracted") : "N/A";

    _prompts[i] = "You are an institutional FX trader with web search access.\n\n"
      + "SIGNAL:\n"
      + "Pair: " + a.pair.replace("/","") + " | Direction: " + dirLabel + "\n"
      + "D1: " + (a.d1_label || "N/A") + " | H4: " + (a.h4_label || "N/A") + " | H1: " + (a.h1_label || "N/A") + "\n"
      + "ADX: " + adxVal + " | ATR: " + atrOk + " | Extended: " + extended + "\n"
      + "Regime (proxy): " + regime_label + " (" + regime_conf + ")\n"
      + "News: \"" + headline + "\"\n"
      + "Time: " + time + "\n\n"
      + "Search current VIX, DXY, and " + a.pair.replace("/","") + " macro context.\n"
      + "Assess: (1) does macro support this direction? (2) is price fresh or extended?\n\n"
      + "Output strictly:\n"
      + "Regime / Edge or Flaw / Verdict\n"
      + "Entry: \nSL: \nTP: \n"
      + "Max 40 words. Be decisive.";
    return `
      <div class="blurb-card">
        <div class="blurb-header">
          <span class="blurb-pair">${a.pair.replace("/","")}</span>
          <span class="blurb-direction ${dirClass}">${dirLabel}</span>
        </div>
        <div class="blurb-text">${headline || "<em>No news context available.</em>"}</div>
        <div class="blurb-time">${time}</div>
        <button class="copy-btn" id="copybtn-${i}" onclick="copyPrompt(${i})">⎘ Copy AI Prompt</button>
      </div>
    `;
  });
  el.innerHTML = cards.join("");
}

// ── Copy prompt ──────────────────────────────────────────────────────────────
function copyPrompt(idx) {
  const text = _prompts[idx];
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copybtn-" + idx);
    btn.textContent = "✓ Copied!";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.textContent = "⎘ Copy AI Prompt";
      btn.classList.remove("copied");
    }, 2000);
  });
}

// ── Market Brief ─────────────────────────────────────────────────────────────
let _cachedData = {};

function copyMarketBrief() {
  const { h1, h4, d1, csm, blurbs } = _cachedData;
  const now = new Date().toLocaleString();
  let text = "";

  text += "MARKET BRIEF — " + now + "\n\n";

  // Currency strength
  if (csm && csm.rankings) {
    text += "CURRENCY STRENGTH (D1):\n";
    Object.entries(csm.rankings).forEach(([ccy, val]) => {
      text += ccy + " " + val.toFixed(0) + "  ";
    });
    text += "\n\n";
  }

  // Technical scores
  text += "TECHNICAL SCORES:\n";
  PAIRS.forEach(pair => {
    const h1d = h1 && h1[pair];
    const h4d = h4 && h4[pair];
    const d1d = d1 && d1[pair];
    if (!h1d && !h4d && !d1d) return;
    const name = displayName(pair);
    const h1l  = h1d ? h1d.label : "N/A";
    const h4l  = h4d ? h4d.label : "N/A";
    const d1l  = d1d ? d1d.label : "N/A";
    // Only include if at least one TF is directional
    if (h1l === "Neutral" && h4l === "Neutral" && d1l === "Neutral") return;
    text += name + ": D1 " + d1l + " | H4 " + h4l + " | H1 " + h1l + "\n";
  });
  text += "\n";

  // Upcoming events from latest alert
  if (blurbs && blurbs.alerts && blurbs.alerts.length > 0) {
    const latest = blurbs.alerts[blurbs.alerts.length - 1];
    if (latest.events && latest.events.length > 0) {
      text += "UPCOMING HIGH-IMPACT EVENTS:\n";
      latest.events.forEach(ev => {
        text += ev.currency + " — " + ev.event + "  " + ev.time_utc + " UTC\n";
      });
      text += "\n";
    }
  }

  // Regime
  const r = _cachedData.regime;
  if (r && r.regime) {
    text += "MARKET REGIME (proxy):\n";
    text += r.regime + " (" + r.confidence + ")\n";
    const s = r.signals || {};
    text += "Safe-haven divergence: " + (s.sh_divergence || "N/A") + "  ";
    text += "USD strength: " + (s.usd_strength || "N/A") + "  ";
    text += "Dispersion: " + (s.dispersion || "N/A") + "\n\n";
  }

  text += "You are a macro FX strategist with web search access.\n\n";
  text += "Search current: VIX, DXY, SPX, WTI, Copper, BTC, US10Y yield.\n\n";
  text += "Output strictly:\n";
  text += "1. Regime (3 words max)\n";
  text += "2. Key driver (1 sentence)\n";
  text += "3. Pair bias:\n";
  text += "   EURUSD / GBPUSD / USDJPY / USDCHF / AUDUSD / USDCAD / NZDUSD / EURJPY / GBPJPY\n";
  text += "   → Strong Sell | Sell | Neutral | Buy | Strong Buy\n";
  text += "4. One caution (1 sentence)\n";
  text += "Max 80 words. No fluff.";

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("market-brief-btn");
    btn.querySelector(".brief-title").textContent = "✓ Copied!";
    btn.querySelector(".brief-sub").textContent = "";
    btn.classList.add("copied");
    setTimeout(() => {
      btn.querySelector(".brief-title").textContent = "Market Brief";
      btn.querySelector(".brief-sub").textContent = "Copy AI Prompt";
      btn.classList.remove("copied");
    }, 2000);
  });
}

// ── Render Regime ────────────────────────────────────────────────────────────
function renderRegime(regime) {
  const badge = document.getElementById("regime-badge");
  const chip  = document.getElementById("regime-chip");
  if (!regime || !regime.regime) return;

  const r    = regime.regime;
  const conf = regime.confidence || "";
  const colors = {
    "Risk-Off": { bg: "rgba(182,35,36,0.15)", border: "#b62324", color: "#f85149" },
    "Risk-On":  { bg: "rgba(35,134,54,0.15)", border: "#238636", color: "#3fb950" },
    "Ranging":  { bg: "rgba(139,148,158,0.1)", border: "#30363d", color: "#8b949e" },
    "Mixed":    { bg: "rgba(227,179,65,0.15)", border: "#e3b341", color: "#e3b341" },
  };
  const c = colors[r] || colors["Mixed"];
  chip.style.background  = c.bg;
  chip.style.borderColor = c.border;
  chip.style.color       = c.color;
  chip.textContent       = `Regime: ${r}  ${conf}`;
  badge.style.display    = "block";
}

// ── Main ─────────────────────────────────────────────────────────────────────
async function init() {
  renderSessions();

  const [h1, h4, d1, csm, blurbs, regime] = await Promise.all([
    loadJSON("h1_scores.json", true),   // updated hourly — use API
    loadJSON("h4_scores.json", true),   // updated 4-hourly — use API
    loadJSON("d1_scores.json"),
    loadJSON("csm.json"),
    loadJSON("alerts.json"),
    loadJSON("regime.json"),
  ]);

  // Last updated — use the most recent timestamp from any dataset
  const timestamps = [h1, h4, d1]
    .flatMap(ds => ds ? Object.values(ds).map(v => v.updated) : [])
    .filter(Boolean)
    .sort();
  if (timestamps.length) {
    const latest = new Date(timestamps[timestamps.length - 1]);
    document.getElementById("last-updated").textContent =
      "Updated: " + latest.toLocaleString();
  }

  _cachedData = { h1, h4, d1, csm, blurbs, regime };
  renderRegime(regime);
  renderCSM(csm);
  renderTable(h1, h4, d1);
  renderBlurbs(blurbs);
}

init();
// Auto-refresh every 5 minutes
setInterval(init, 5 * 60 * 1000);
</script>
