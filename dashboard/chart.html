<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>FX Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root {
  --bg:      #0d1117;
  --surface: #161b22;
  --surface2:#1c2128;
  --border:  #30363d;
  --border2: #21262d;
  --text:    #e6edf3;
  --muted:   #8b949e;
  --buy:     #3fb950;
  --sell:    #f85149;
  --accent:  #58a6ff;
  --amber:   #e3b341;
  --xs: 10px; --sm: 11px; --md: 13px; --lg: 17px;
  --pad: 12px; --r: 8px; --r-sm: 5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

/* ── Header ── */
#hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 10px var(--pad) 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0; height: 54px;
}
#btn-back {
  background: transparent; border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--muted); width: 30px; height: 30px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 15px;
}
#btn-back:active { background: var(--surface2); }
#pair-btn {
  background: transparent; border: none; cursor: pointer; display: flex; align-items: center;
  gap: 5px; flex-shrink: 0;
}
#pair-lbl { font-size: var(--lg); font-weight: 700; color: var(--text); letter-spacing: -.01em; }
#pair-caret { color: var(--muted); font-size: 10px; }
#price-wrap { display: flex; flex-direction: column; align-items: flex-end; flex: 1; min-width: 0; }
#price-lbl { font-family: 'VT323', monospace; font-size: 20px; line-height: 1; }
#price-chg  { font-size: var(--xs); font-weight: 700; }
#sig-badges { display: flex; gap: 4px; flex-shrink: 0; }
.sig-badge {
  padding: 3px 6px; border-radius: 3px; font-size: var(--xs); font-weight: 700;
  border: 1px solid transparent; white-space: nowrap;
}
.sig-SB { background: rgba(35,134,54,.3); border-color: rgba(35,134,54,.6); color: var(--buy); }
.sig-B  { background: rgba(35,134,54,.15); border-color: rgba(35,134,54,.35); color: var(--buy); }
.sig-SS { background: rgba(248,81,73,.3); border-color: rgba(248,81,73,.6); color: var(--sell); }
.sig-S  { background: rgba(248,81,73,.15); border-color: rgba(248,81,73,.35); color: var(--sell); }
.sig-CF { background: rgba(227,179,65,.15); border-color: rgba(227,179,65,.4); color: var(--amber); }
.sig-N  { background: rgba(139,148,158,.08); border-color: rgba(139,148,158,.2); color: var(--muted); }

/* ── TF bar ── */
#tf-bar {
  display: flex; align-items: center;
  padding: 6px var(--pad);
  background: var(--bg);
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0; gap: 4px;
}
.tf-btn {
  background: transparent; border: 1px solid transparent; border-radius: var(--r-sm);
  color: var(--muted); font-size: var(--sm); font-weight: 700; padding: 4px 12px;
  cursor: pointer; text-transform: uppercase; letter-spacing: .06em; transition: all .15s;
}
.tf-btn.active { background: var(--surface); border-color: var(--border); color: var(--text); }
.tf-btn:active { opacity: .7; }
#candle-timer {
  margin-left: auto; font-family: 'VT323', monospace; font-size: 15px; color: var(--muted);
}

/* ── Chart area ── */
#chart-wrap {
  flex: 1; min-height: 0; display: flex; flex-direction: column; position: relative;
  background: var(--bg);
}
#chart-main  { flex: 1; min-height: 0; }
#ohlc-bar {
  position: absolute; top: 8px; left: 8px; z-index: 20;
  font-family: 'VT323', monospace; font-size: 13px; line-height: 1.4;
  background: rgba(13,17,23,.85); padding: 3px 8px; border-radius: 4px;
  border: 1px solid rgba(48,54,61,.6); pointer-events: none; display: none;
  white-space: nowrap; color: var(--muted);
}
#drag-handle {
  height: 5px; flex-shrink: 0; cursor: ns-resize; background: transparent; position: relative;
  display: none;
}
#drag-handle::after {
  content: ''; position: absolute; inset: 1px 0;
  background: var(--border); border-radius: 2px;
}
#chart-sub   { height: 25%; min-height: 60px; flex-shrink: 0; display: none; }
#sub-lbl {
  position: absolute; top: 4px; left: 8px; z-index: 10;
  font-family: 'VT323', monospace; font-size: 12px; color: var(--muted);
  pointer-events: none;
}

/* ── Alert mode overlay ── */
#alert-mode-bar {
  display: none; position: absolute; top: 0; left: 0; right: 0;
  background: rgba(227,179,65,.12); border-bottom: 1px solid rgba(227,179,65,.4);
  padding: 7px var(--pad); font-size: var(--sm); color: var(--amber); font-weight: 700;
  z-index: 30; text-align: center; letter-spacing: .04em;
}

/* ── Toolbar ── */
#toolbar {
  display: flex; align-items: center; gap: 4px;
  padding: 7px var(--pad);
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0; flex-wrap: wrap;
}
.ind-btn {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-sm);
  color: var(--muted); font-size: var(--xs); font-weight: 700; padding: 5px 9px;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.ind-btn.on { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.1); }
.ind-btn:active { opacity: .7; }
#toolbar-sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }
.ind-btn.alert-btn { margin-left: auto; }
.ind-btn.alert-btn.on { border-color: var(--amber); color: var(--amber); background: rgba(227,179,65,.1); }

/* ── Pair picker sheet ── */
#sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 400; display: none; }
#pair-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  border-radius: 16px 16px 0 0; z-index: 401;
  transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
  max-height: 75vh; display: flex; flex-direction: column;
}
#pair-sheet.open { transform: translateY(0); }
#sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 10px auto 8px; }
#sheet-title  { font-size: var(--md); font-weight: 700; padding: 0 var(--pad) 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
#pair-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px; padding: 0 var(--pad) var(--pad);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.pair-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: border-color .15s;
}
.pair-item.selected { border-color: var(--accent); background: rgba(88,166,255,.07); }
.pair-item:active { opacity: .75; }
.pi-name { font-size: var(--md); font-weight: 700; }
.pi-sig  { font-size: var(--xs); font-weight: 700; }

/* ── Loading state ── */
#loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; z-index: 50;
  background: var(--bg); font-size: var(--sm); color: var(--muted);
}
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Page layout ── */
body { display: flex; flex-direction: column; }
#chart-wrap { position: relative; }
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <button id="btn-back" onclick="goBack()" title="Back to dashboard">←</button>
  <button id="pair-btn" onclick="openPairSheet()">
    <span id="pair-lbl">EURUSD</span>
    <span id="pair-caret">▾</span>
  </button>
  <div id="price-wrap">
    <span id="price-lbl" style="color:var(--muted)">—</span>
    <span id="price-chg" style="color:var(--muted)">—</span>
  </div>
  <div id="sig-badges">
    <span class="sig-badge sig-N" id="sig-d1" title="D1">D1</span>
    <span class="sig-badge sig-N" id="sig-h4" title="H4">H4</span>
    <span class="sig-badge sig-N" id="sig-h1" title="H1">H1</span>
  </div>
</div>

<!-- TF bar -->
<div id="tf-bar">
  <button class="tf-btn" id="tf-D1" onclick="setTf('D1')">D1</button>
  <button class="tf-btn" id="tf-H4" onclick="setTf('H4')">H4</button>
  <button class="tf-btn active" id="tf-H1" onclick="setTf('H1')">H1</button>
  <span id="candle-timer"></span>
</div>

<!-- Chart -->
<div id="chart-wrap">
  <div id="loading"><div class="spinner"></div><span id="loading-msg">Loading chart data…</span></div>
  <div id="alert-mode-bar">⚡ Tap chart to place alert — tap again to cancel</div>
  <div id="ohlc-bar"></div>
  <div id="chart-main"></div>
  <div id="drag-handle"></div>
  <div id="chart-sub" style="position:relative;">
    <span id="sub-lbl"></span>
  </div>
</div>

<!-- Toolbar -->
<div id="toolbar">
  <button class="ind-btn" id="btn-ema200" onclick="toggleInd('ema200')">EMA 200</button>
  <button class="ind-btn" id="btn-ema50"  onclick="toggleInd('ema50')">EMA 50</button>
  <button class="ind-btn" id="btn-bb"     onclick="toggleInd('bb')">BB</button>
  <div id="toolbar-sep"></div>
  <button class="ind-btn" id="btn-macd"   onclick="toggleInd('macd')">MACD</button>
  <button class="ind-btn" id="btn-rsi"    onclick="toggleInd('rsi')">RSI</button>
  <button class="ind-btn alert-btn" id="btn-alert" onclick="toggleAlertMode()">⚡ Alert</button>
</div>

<!-- Pair picker sheet -->
<div id="sheet-overlay" onclick="closePairSheet()"></div>
<div id="pair-sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-title">Select Pair</div>
  <div id="pair-grid"></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const GH_RAW  = 'https://raw.githubusercontent.com/Pieter800320/fx_technical/main/data';
const TD_WS   = 'wss://ws.twelvedata.com/v1/quotes/price';
const LA_KEY  = 'fx1212_level_alerts_v1';
const IND_KEY = 'fx1212_indicators_v1';
const PAIRS   = ['EUR/USD','GBP/USD','USD/JPY','USD/CHF','AUD/USD','USD/CAD',
                 'NZD/USD','EUR/JPY','GBP/JPY','AUD/JPY','NZD/JPY','CAD/JPY'];

const CLR = {
  ema200: '#e6edf3', ema50: '#58a6ff', bb: '#484f58',
  up: 'rgba(63,185,80,.8)', dn: 'rgba(248,81,73,.8)',
  upFill: 'rgba(63,185,80,.1)', dnFill: 'rgba(248,81,73,.1)',
  macdLine: '#58a6ff', signal: '#e3b341', hist_up: 'rgba(63,185,80,.7)', hist_dn: 'rgba(248,81,73,.7)',
  rsi: '#bc8cff', alert: '#e3b341',
};

// ── State ──────────────────────────────────────────────────────────────────
const urlParam = new URLSearchParams(location.search).get('pair') || '';
let currentPair = PAIRS.find(p => p.replace('/','') === urlParam) || PAIRS[0];
let currentTf   = 'H1';
let D = {};          // loaded JSON data
let inds = loadInds();
let alertMode = false;

// Chart instances
let mainChart    = null;
let candleSeries = null;
let subChart     = null;
let subSeries    = null;
let priceLine    = null;
let alertSeriesMap = {}; // id → series

// WebSocket
let ws = null, wsPair = null, wsLastPrice = null;

// ResizeObserver
let resizeObs = null;

// Candle timer
let timerInt = null;

// ── Utilities ──────────────────────────────────────────────────────────────
function loadInds() {
  try {
    const saved = JSON.parse(localStorage.getItem(IND_KEY) || '{}');
    return { ema200: true, ema50: false, bb: false, macd: false, rsi: false, ...saved };
  } catch { return { ema200: true, ema50: false, bb: false, macd: false, rsi: false }; }
}
function saveInds() { localStorage.setItem(IND_KEY, JSON.stringify(inds)); }

function laLoad() { try { return JSON.parse(localStorage.getItem(LA_KEY) || '[]'); } catch { return []; } }
function laSave(a) { localStorage.setItem(LA_KEY, JSON.stringify(a)); }

function isJpy(pair) { return pair.includes('JPY'); }
function dec(pair) { return isJpy(pair) ? 3 : 5; }
function fmt(val, pair) { return val != null ? val.toFixed(dec(pair)) : '—'; }

function goBack() {
  if (document.referrer && document.referrer.includes(location.hostname)) {
    history.back();
  } else {
    location.href = 'index.html';
  }
}

// ── Data loading ──────────────────────────────────────────────────────────
async function loadJSON(name) {
  const r = await fetch(`${GH_RAW}/${name}?t=${Date.now()}`);
  if (!r.ok) throw new Error(name + ' ' + r.status);
  return r.json();
}

function getOhlcv(pair, tf) {
  if (!D[tf]) return [];
  return (D[tf]._ohlcv && D[tf]._ohlcv[pair]) || [];
}

function getSignalData(pair, tf) {
  const key = tf.toLowerCase() + '_scores';
  const src = tf === 'D1' ? D.d1 : tf === 'H4' ? D.h4 : D.h1;
  return src && src[pair] ? src[pair] : null;
}

// ── Indicator math ────────────────────────────────────────────────────────
function computeEMA(vals, period) {
  if (!vals.length) return [];
  const k = 2 / (period + 1);
  const r = [vals[0]];
  for (let i = 1; i < vals.length; i++) r.push(vals[i] * k + r[i-1] * (1-k));
  return r;
}

function computeBB(ohlcv, period = 20, mult = 2) {
  if (!ohlcv || ohlcv.length < period) return [];
  const closes = ohlcv.map(d => d.close);
  const out = [];
  for (let i = period - 1; i < closes.length; i++) {
    const slice = closes.slice(i - period + 1, i + 1);
    const mean = slice.reduce((a, b) => a + b, 0) / period;
    const std  = Math.sqrt(slice.reduce((a, b) => a + (b - mean) ** 2, 0) / period);
    out.push({ time: ohlcv[i].time, upper: mean + mult*std, middle: mean, lower: mean - mult*std });
  }
  return out;
}

function computeMACD(ohlcv, fast = 12, slow = 26, sig = 9) {
  if (!ohlcv || ohlcv.length < slow + sig) return [];
  const closes = ohlcv.map(d => d.close);
  const ema12 = computeEMA(closes, fast);
  const ema26 = computeEMA(closes, slow);
  const macdLine  = ema12.map((v, i) => v - ema26[i]).slice(slow - 1);
  const signalLine = computeEMA(macdLine, sig);
  return signalLine.map((sv, i) => {
    const oi = i + (slow - 1);
    return { time: ohlcv[oi].time, macd: macdLine[i], signal: sv, histogram: macdLine[i] - sv };
  });
}

function computeRSI(ohlcv, period = 14) {
  if (!ohlcv || ohlcv.length < period + 1) return [];
  const closes = ohlcv.map(d => d.close);
  let avgG = 0, avgL = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i-1];
    avgG += Math.max(d, 0); avgL += Math.max(-d, 0);
  }
  avgG /= period; avgL /= period;
  const out = [];
  for (let i = period; i < closes.length; i++) {
    if (i > period) {
      const d = closes[i] - closes[i-1];
      avgG = (avgG * (period-1) + Math.max(d, 0)) / period;
      avgL = (avgL * (period-1) + Math.max(-d, 0)) / period;
    }
    const rs = avgL === 0 ? 100 : avgG / avgL;
    out.push({ time: ohlcv[i].time, value: 100 - 100 / (1 + rs) });
  }
  return out;
}

// ── Chart rendering ───────────────────────────────────────────────────────
function destroyCharts() {
  if (mainChart) { try { mainChart.remove(); } catch(e){} mainChart = null; }
  if (subChart)  { try { subChart.remove(); }  catch(e){} subChart  = null; }
  candleSeries = null; subSeries = null; priceLine = null; alertSeriesMap = {};
}

function renderChart() {
  destroyCharts();
  const ohlcv = getOhlcv(currentPair, currentTf);

  const mainEl = document.getElementById('chart-main');
  const subEl  = document.getElementById('chart-sub');
  const subLbl = document.getElementById('sub-lbl');
  const dragEl = document.getElementById('drag-handle');

  const hasSub = inds.macd || inds.rsi;
  subEl.style.display  = hasSub ? 'block' : 'none';
  dragEl.style.display = hasSub ? 'block' : 'none';

  const w = mainEl.clientWidth;
  const totalH = document.getElementById('chart-wrap').clientHeight;
  const subH   = hasSub ? Math.max(60, Math.round(totalH * 0.25)) : 0;
  const mainH  = totalH - subH - (hasSub ? 5 : 0);

  const chartOpts = (h) => ({
    width: w, height: h,
    layout: { background: { color: 'transparent' }, textColor: '#8b949e' },
    grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#30363d', autoScale: true, scaleMargins: { top: 0.07, bottom: 0.07 } },
    timeScale: { borderColor: '#30363d', timeVisible: true, secondsVisible: false },
    handleScroll: true, handleScale: true,
  });

  // Main chart
  mainChart = LightweightCharts.createChart(mainEl, chartOpts(mainH));

  const priceFormat = { type: 'price', precision: dec(currentPair), minMove: isJpy(currentPair) ? 0.001 : 0.00001 };

  candleSeries = mainChart.addCandlestickSeries({
    upColor:        'rgba(63,185,80,.15)',
    downColor:      'rgba(248,81,73,.15)',
    borderUpColor:  CLR.up,
    borderDownColor:CLR.dn,
    wickUpColor:    'rgba(63,185,80,.5)',
    wickDownColor:  'rgba(248,81,73,.5)',
    priceLineVisible: false,
    lastValueVisible: false,
    priceFormat,
  });

  if (ohlcv.length) {
    candleSeries.setData(ohlcv);

    // EMA 200
    if (inds.ema200 && ohlcv.length >= 10) {
      const v = computeEMA(ohlcv.map(d => d.close), 200);
      mainChart.addLineSeries({ color: CLR.ema200, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false }).setData(ohlcv.map((d,i) => ({ time: d.time, value: v[i] })));
    }

    // EMA 50
    if (inds.ema50 && ohlcv.length >= 10) {
      const v = computeEMA(ohlcv.map(d => d.close), 50);
      mainChart.addLineSeries({ color: CLR.ema50, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false }).setData(ohlcv.map((d,i) => ({ time: d.time, value: v[i] })));
    }

    // Bollinger Bands
    if (inds.bb) {
      const bb = computeBB(ohlcv);
      if (bb.length) {
        [['upper', 0], ['middle', LightweightCharts.LineStyle.Dashed], ['lower', 0]].forEach(([k, ls]) => {
          mainChart.addLineSeries({ color: CLR.bb, lineWidth: 1, lineStyle: ls, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false }).setData(bb.map(d => ({ time: d.time, value: d[k] })));
        });
      }
    }

    // Alert lines from localStorage
    renderAlertLines();

    // Visible range: last 80 candles + 2 right margin
    const n = Math.min(80, ohlcv.length);
    mainChart.timeScale().setVisibleLogicalRange({ from: ohlcv.length - n, to: ohlcv.length + 2 });
  }

  // OHLC tooltip
  const ohlcBar = document.getElementById('ohlc-bar');
  mainChart.subscribeCrosshairMove(param => {
    if (!param.point || !param.seriesPrices) { ohlcBar.style.display = 'none'; return; }
    const c = param.seriesPrices.get(candleSeries);
    if (!c) { ohlcBar.style.display = 'none'; return; }
    const p = currentPair;
    ohlcBar.style.display = 'block';
    const dir = c.close >= c.open;
    ohlcBar.innerHTML =
      `<span style="color:${dir ? 'var(--buy)' : 'var(--sell)'}">O:</span>${fmt(c.open,p)} ` +
      `<span style="color:var(--buy)">H:</span>${fmt(c.high,p)} ` +
      `<span style="color:var(--sell)">L:</span>${fmt(c.low,p)} ` +
      `<span style="color:${dir ? 'var(--buy)' : 'var(--sell)'}">C:</span>${fmt(c.close,p)}`;
  });

  // Alert tap on chart
  mainChart.subscribeClick(param => {
    if (!alertMode || !param.point) return;
    const price = mainChart.priceScale('right').coordinateToPrice(param.point.y);
    if (price == null) return;
    placeAlert(parseFloat(price.toFixed(dec(currentPair))));
    setAlertMode(false);
  });

  // Sub chart (MACD or RSI)
  if (hasSub && ohlcv.length) {
    subChart = LightweightCharts.createChart(subEl, { ...chartOpts(subH), rightPriceScale: { borderColor: '#30363d', autoScale: true, scaleMargins: { top: 0.1, bottom: 0.1 } } });

    if (inds.macd) {
      subLbl.textContent = 'MACD';
      const md = computeMACD(ohlcv);
      if (md.length) {
        const hist = subChart.addHistogramSeries({ priceLineVisible: false, lastValueVisible: false });
        hist.setData(md.map(d => ({ time: d.time, value: d.histogram, color: d.histogram >= 0 ? CLR.hist_up : CLR.hist_dn })));
        subChart.addLineSeries({ color: CLR.macdLine, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false }).setData(md.map(d => ({ time: d.time, value: d.macd })));
        subChart.addLineSeries({ color: CLR.signal, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false }).setData(md.map(d => ({ time: d.time, value: d.signal })));
        subSeries = hist;
      }
    } else if (inds.rsi) {
      subLbl.textContent = 'RSI (14)';
      const rd = computeRSI(ohlcv);
      if (rd.length) {
        subSeries = subChart.addLineSeries({ color: CLR.rsi, lineWidth: 1, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false });
        subSeries.setData(rd);
        // overbought / oversold
        const times = rd.map(d => d.time);
        if (times.length >= 2) {
          [{ v: 70, c: 'rgba(248,81,73,.3)' }, { v: 30, c: 'rgba(63,185,80,.3)' }, { v: 50, c: '#30363d' }].forEach(({ v, c }) => {
            subChart.addLineSeries({ color: c, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed, priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false })
              .setData([{ time: times[0], value: v }, { time: times[times.length-1], value: v }]);
          });
        }
      }
    }

    // Sync time scales
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!subChart || !range) return;
      try { subChart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    });
    subChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (!mainChart || !range) return;
      try { mainChart.timeScale().setVisibleLogicalRange(range); } catch(e){}
    });

    // Sync range from main
    setTimeout(() => {
      if (!subChart || !mainChart) return;
      try {
        const vr = mainChart.timeScale().getVisibleRange();
        if (vr) subChart.timeScale().setVisibleRange(vr);
      } catch(e){}
    }, 50);
  }

  // Apply live price if available
  if (wsLastPrice && wsPair === currentPair) updateLivePrice(wsLastPrice);

  // Resize observer — disconnect old before creating new
  if (resizeObs) { resizeObs.disconnect(); resizeObs = null; }
  resizeObs = new ResizeObserver(() => resizeCharts());
  resizeObs.observe(mainEl);
}

function resizeCharts() {
  if (!mainChart) return;
  const mainEl = document.getElementById('chart-main');
  const subEl  = document.getElementById('chart-sub');
  const hasSub = inds.macd || inds.rsi;
  const totalH = document.getElementById('chart-wrap').clientHeight;
  const subH   = hasSub ? Math.max(60, Math.round(totalH * 0.25)) : 0;
  const mainH  = totalH - subH - (hasSub ? 5 : 0);
  mainChart.resize(mainEl.clientWidth, mainH);
  if (subChart && hasSub) subChart.resize(subEl.clientWidth, subH);
}

// ── Alert lines ────────────────────────────────────────────────────────────
function renderAlertLines() {
  if (!mainChart || !candleSeries) return;
  const ohlcv = getOhlcv(currentPair, currentTf);
  if (!ohlcv.length) return;
  const startTime = ohlcv[0].time;
  const endTime   = ohlcv[ohlcv.length - 1].time + 86400 * 30;
  const alerts = laLoad().filter(a => !a.type && a.pair === currentPair && a.active);
  alerts.forEach(a => {
    if (alertSeriesMap[a.id]) return;
    const s = mainChart.addLineSeries({
      color: CLR.alert, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
      priceLineVisible: false, lastValueVisible: true, crosshairMarkerVisible: false,
      title: fmt(a.price, currentPair),
    });
    s.setData([{ time: startTime, value: a.price }, { time: endTime, value: a.price }]);
    alertSeriesMap[a.id] = s;
  });
}

function placeAlert(price) {
  const alerts = laLoad();
  const existing = alerts.find(a => a.pair === currentPair && Math.abs(a.price - price) < 0.0001 && a.active);
  if (existing) return;
  const alert = { id: Date.now(), pair: currentPair, price, direction: 'above', active: true, created: new Date().toLocaleString() };
  alerts.push(alert);
  laSave(alerts);
  renderAlertLines();
}

// ── Live price ─────────────────────────────────────────────────────────────
function updateLivePrice(price) {
  wsLastPrice = price;
  // Update price line in chart
  if (mainChart && candleSeries) {
    try {
      if (priceLine) { candleSeries.removePriceLine(priceLine); priceLine = null; }
      priceLine = candleSeries.createPriceLine({ price, color: 'rgba(88,166,255,.6)', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted, axisLabelVisible: true, title: '' });
    } catch(e){}
  }
  // Update header price display
  const priceEl = document.getElementById('price-lbl');
  const chgEl   = document.getElementById('price-chg');
  priceEl.textContent = fmt(price, currentPair);
  const ohlcv = getOhlcv(currentPair, currentTf);
  if (ohlcv.length >= 2) {
    const open  = ohlcv[0].close; // day's open approximation
    const chg   = ((price - open) / open) * 100;
    const up    = chg >= 0;
    priceEl.style.color  = up ? 'var(--buy)' : 'var(--sell)';
    chgEl.textContent    = (up ? '▲' : '▼') + ' ' + Math.abs(chg).toFixed(3) + '%';
    chgEl.style.color    = up ? 'var(--buy)' : 'var(--sell)';
  }
}

function wsConnect() {
  wsDisconnect();
  const key = localStorage.getItem('fx1212_td_key');
  if (!key) return;
  wsPair = currentPair;
  ws = new WebSocket(`${TD_WS}?apikey=${key}`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ action: 'subscribe', params: { symbols: currentPair.replace('/', '') } }));
  };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.event === 'price' && d.price) updateLivePrice(parseFloat(d.price));
    } catch(err){}
  };
  ws.onerror = () => {};
  ws.onclose = () => {};
}

function wsDisconnect() {
  if (ws) { try { ws.close(); } catch(e){} ws = null; }
  wsPair = null;
}

// ── Candle timer ───────────────────────────────────────────────────────────
function startTimer() {
  if (timerInt) clearInterval(timerInt);
  const el = document.getElementById('candle-timer');
  function tick() {
    if (!el) return;
    const now  = Math.floor(Date.now() / 1000);
    const secs = { D1: 86400, H4: 14400, H1: 3600 }[currentTf] || 3600;
    const left = secs - (now % secs);
    const h = Math.floor(left / 3600), m = Math.floor((left % 3600) / 60), s = left % 60;
    const p = n => String(n).padStart(2, '0');
    el.textContent = h > 0 ? `${h}:${p(m)}:${p(s)}` : `${p(m)}:${p(s)}`;
    el.style.color = left <= 60 ? 'var(--sell)' : 'var(--muted)';
  }
  tick();
  timerInt = setInterval(tick, 1000);
}

// ── Signal badges ──────────────────────────────────────────────────────────
function renderSignalBadges() {
  [['d1', 'D1', 'd1'], ['h4', 'H4', 'h4'], ['h1', 'H1', 'h1']].forEach(([elId, tf, key]) => {
    const el   = document.getElementById('sig-' + elId);
    const src  = key === 'd1' ? D.d1 : key === 'h4' ? D.h4 : D.h1;
    const data = src && src[currentPair];
    if (!data) { el.textContent = tf; el.className = 'sig-badge sig-N'; return; }
    const lbl  = data.label || 'N';
    const cls  = lbl.includes('Strong Buy') ? 'sig-SB' : lbl.includes('Buy') ? 'sig-B' : lbl.includes('Strong Sell') ? 'sig-SS' : lbl.includes('Sell') ? 'sig-S' : lbl.includes('Conflict') ? 'sig-CF' : 'sig-N';
    el.textContent = tf;
    el.className   = 'sig-badge ' + cls;
    el.title       = tf + ': ' + lbl;
  });
}

// ── Pair selection ─────────────────────────────────────────────────────────
function openPairSheet() {
  const grid = document.getElementById('pair-grid');
  grid.innerHTML = '';
  PAIRS.forEach(p => {
    const h4data = D.h4 && D.h4[p];
    const lbl = h4data ? h4data.label : '—';
    const cls = lbl.includes('Strong Buy') ? 'var(--buy)' : lbl.includes('Buy') ? 'var(--buy)' : lbl.includes('Strong Sell') ? 'var(--sell)' : lbl.includes('Sell') ? 'var(--sell)' : lbl.includes('Conflict') ? 'var(--amber)' : 'var(--muted)';
    const div = document.createElement('div');
    div.className = 'pair-item' + (p === currentPair ? ' selected' : '');
    div.innerHTML = `<span class="pi-name">${p.replace('/','')}</span><span class="pi-sig" style="color:${cls}">${lbl}</span>`;
    div.onclick = () => selectPair(p);
    grid.appendChild(div);
  });
  document.getElementById('sheet-overlay').style.display = 'block';
  document.getElementById('pair-sheet').classList.add('open');
}

function closePairSheet() {
  document.getElementById('sheet-overlay').style.display = 'none';
  document.getElementById('pair-sheet').classList.remove('open');
}

function selectPair(pair) {
  closePairSheet();
  if (pair === currentPair) return;
  currentPair = pair;
  history.replaceState({}, '', '?pair=' + pair.replace('/', ''));
  document.getElementById('pair-lbl').textContent = pair.replace('/', '');
  document.getElementById('price-lbl').textContent = '—';
  document.getElementById('price-chg').textContent  = '—';
  document.getElementById('price-lbl').style.color  = 'var(--muted)';
  document.getElementById('price-chg').style.color  = 'var(--muted)';
  wsLastPrice = null;
  renderSignalBadges();
  renderChart();
  wsConnect();
}

// ── TF selection ──────────────────────────────────────────────────────────
function setTf(tf) {
  currentTf = tf;
  ['D1','H4','H1'].forEach(t => document.getElementById('tf-' + t).classList.toggle('active', t === tf));
  startTimer();
  renderChart();
}

// ── Indicator toggles ─────────────────────────────────────────────────────
function toggleInd(key) {
  if ((key === 'macd' || key === 'rsi') && !inds[key]) {
    inds.macd = false; inds.rsi = false; // mutual exclusion
  }
  inds[key] = !inds[key];
  saveInds();
  updateIndButtons();
  renderChart();
}

function updateIndButtons() {
  Object.keys(inds).forEach(k => {
    const btn = document.getElementById('btn-' + k);
    if (btn) btn.classList.toggle('on', !!inds[k]);
  });
}

// ── Alert mode ────────────────────────────────────────────────────────────
function toggleAlertMode() { setAlertMode(!alertMode); }

function setAlertMode(on) {
  alertMode = on;
  document.getElementById('btn-alert').classList.toggle('on', on);
  document.getElementById('alert-mode-bar').style.display = on ? 'block' : 'none';
}

// ── Drag-to-resize sub pane ───────────────────────────────────────────────
(function initDrag() {
  const drag = document.getElementById('drag-handle');
  let dragging = false, startY = 0, startSubH = 0;
  const onStart = (y) => {
    dragging = true;
    startY    = y;
    const sub = document.getElementById('chart-sub');
    startSubH = sub.clientHeight;
    document.body.style.userSelect = 'none';
  };
  const onMove = (y) => {
    if (!dragging) return;
    const delta  = startY - y;
    const newH   = Math.max(50, Math.min(300, startSubH + delta));
    const sub    = document.getElementById('chart-sub');
    sub.style.height = newH + 'px';
    resizeCharts();
  };
  const onEnd = () => { dragging = false; document.body.style.userSelect = ''; };
  drag.addEventListener('mousedown',  e => onStart(e.clientY));
  drag.addEventListener('touchstart', e => onStart(e.touches[0].clientY), { passive: true });
  window.addEventListener('mousemove',  e => onMove(e.clientY));
  window.addEventListener('touchmove',  e => onMove(e.touches[0].clientY), { passive: true });
  window.addEventListener('mouseup',   onEnd);
  window.addEventListener('touchend',  onEnd);
})();

// ── Fetch latest quote to top up OHLCV ────────────────────────────────────
async function fetchLatestQuote(pair, tf) {
  const key = localStorage.getItem('fx1212_td_key');
  if (!key) return;
  try {
    const sym = pair.replace('/', '');
    const interval = { H1: '1h', H4: '4h', D1: '1day' }[tf] || '1h';
    const r = await fetch(`https://api.twelvedata.com/quote?symbol=${sym}&interval=${interval}&apikey=${key}`);
    if (!r.ok) return;
    const q = await r.json();
    if (q && q.close && !q.status) {
      const ts  = Math.floor(new Date(q.datetime).getTime() / 1000);
      const bar = { time: ts, open: parseFloat(q.open), high: parseFloat(q.high), low: parseFloat(q.low), close: parseFloat(q.close) };
      const ohlcv = getOhlcv(pair, tf);
      if (!ohlcv.length) return;
      const last = ohlcv[ohlcv.length - 1];
      if (last.time === ts) ohlcv[ohlcv.length - 1] = bar;
      else if (ts > last.time) ohlcv.push(bar);
      if (candleSeries && pair === currentPair && tf === currentTf) {
        try { candleSeries.update(ohlcv[ohlcv.length - 1]); } catch(e){}
      }
      // Update price header from quote
      updateLivePrice(bar.close);
    }
  } catch(e){}
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('pair-lbl').textContent = currentPair.replace('/', '');
  document.getElementById('loading').style.display = 'flex';

  ['D1','H4','H1'].forEach(t => document.getElementById('tf-' + t).classList.toggle('active', t === currentTf));
  updateIndButtons();
  startTimer();

  try {
    document.getElementById('loading-msg').textContent = 'Loading candle data…';
    const [h1, h4, d1] = await Promise.all([
      loadJSON('h1_scores.json'),
      loadJSON('h4_scores.json'),
      loadJSON('d1_scores.json'),
    ]);
    D = { h1, h4, d1 };
  } catch(e) {
    document.getElementById('loading-msg').textContent = 'Failed to load data. Check connection.';
    return;
  }

  document.getElementById('loading').style.display = 'none';
  renderSignalBadges();
  renderChart();
  wsConnect();
  fetchLatestQuote(currentPair, currentTf);
}

init();
</script>
